<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Fury Mobile</title>
<style>
:root {
    --hud-height: 170px;
    --fighter-width: 74px;
    --fighter-height: 130px;
}

* { box-sizing: border-box; user-select: none; }

body {
    margin: 0;
    background: radial-gradient(circle at 50% 20%, #3f4e6f, #0f1117 60%);
    font-family: "Trebuchet MS", Arial, sans-serif;
    overflow: hidden;
    color: white;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0,0,0,0.2)),
      repeating-linear-gradient(90deg, #0f2a40 0 14%, #132f45 14% 28%, #17354a 28% 42%);
}

#arena { position: absolute; inset: 0; overflow: hidden; }

.stage-banner {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffffad;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

#floor {
    position: absolute;
    bottom: var(--hud-height);
    width: 100%;
    height: 14px;
    background: linear-gradient(90deg, #70738d, #d7dcff, #70738d);
    box-shadow: 0 0 20px #f4f7ff66;
}

.fighter {
    position: absolute;
    width: var(--fighter-width);
    height: var(--fighter-height);
    border-radius: 12px;
    border: 2px solid #ffffff77;
    transform-origin: center bottom;
    transition: transform 100ms ease;
}

#player {
    left: 80px;
    background: linear-gradient(to top, #2dc5db, #7ef5ff);
    box-shadow: 0 0 18px #50d0ff88;
}

#enemy {
    left: calc(100vw - 160px);
    background: linear-gradient(to top, #d73b7d, #ff8dac);
    box-shadow: 0 0 18px #ff6b9888;
}

.face-left { transform: scaleX(-1); }
.face-right { transform: scaleX(1); }

.fighter.punch { filter: saturate(1.2); }
.fighter.kick { filter: hue-rotate(18deg); }
.fighter.hit { filter: brightness(1.7); }
.fighter.block { opacity: 0.8; }
.fighter.crouch { transform: scaleY(0.78); }

.projectile {
    position: absolute;
    width: 28px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #fff6;
    background: radial-gradient(circle at 35% 35%, #fff, #6f85ff 55%, #4f32e3 100%);
    box-shadow: 0 0 12px #9e7cff;
}

.projectile.enemy {
    background: radial-gradient(circle at 35% 35%, #fff, #ff8ab2 55%, #dd2b63 100%);
    box-shadow: 0 0 12px #ff7fa8;
}

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 14px 14px 0;
    z-index: 10;
}

.health-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
}

.health-container {
    height: 24px;
    background: #222b;
    border: 2px solid #ffffff5d;
    border-radius: 999px;
    overflow: hidden;
}

.health-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #48ff8a, #c5ff4f);
    transition: width 130ms ease;
}

#enemy-health {
    margin-left: auto;
    background: linear-gradient(90deg, #ff4f7f, #ff9f3f);
}

#timer {
    min-width: 62px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #fff5af;
    text-shadow: 0 0 10px #f7d06b;
}

#meta-row {
    margin-top: 8px;
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    align-items: center;
    gap: 10px;
}

.meter-wrap { display: flex; gap: 8px; align-items: center; font-size: 12px; }

.meter {
    height: 12px;
    border-radius: 999px;
    background: #ffffff22;
    border: 1px solid #ffffff55;
    overflow: hidden;
    flex: 1;
}

.meter-fill {
    width: 0%;
    height: 100%;
    transition: width 120ms linear;
}

#special-fill {
    background: linear-gradient(90deg, #8f45ff, #f554ff);
    box-shadow: 0 0 8px #da68ff;
}

#enemy-super-fill {
    background: linear-gradient(90deg, #ff5f8e, #ff8f46);
    box-shadow: 0 0 8px #ff8a69;
}

#round-area {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-self: end;
}

#round { font-size: 14px; }

.round-pips {
    display: flex;
    gap: 4px;
}

.pip {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid #ffffff88;
    background: #0006;
}

.pip.win { background: #ffe95b; box-shadow: 0 0 6px #ffe95b; }

#announcer {
    position: absolute;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    background: #00000090;
    border: 2px solid #ffffff50;
    border-radius: 8px;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 160ms ease;
}

#combo {
    position: absolute;
    top: 110px;
    right: 18px;
    color: #ffd56b;
    font-size: 18px;
    text-shadow: 0 0 10px #ff9b2f;
    opacity: 0;
    transition: opacity 120ms ease;
}

#controls {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: var(--hud-height);
    background: linear-gradient(to top, #05070fdd, #0f1520cc);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
}

.control-pad,
.action-pad {
    display: flex;
    gap: 10px;
    align-items: center;
}

button {
    width: 62px;
    height: 62px;
    font-size: 20px;
    border-radius: 50%;
    border: 2px solid #ffffff55;
    color: #fff;
    background: #5d6477;
}

button:active { transform: scale(0.95); }

.attack { background: #e16322; }
.special { background: #7a32dd; }
.block { background: #2470bf; }
.jump { background: #3f9f6b; }
.kick { background: #9f5026; }

#keyboard-tip {
    position: absolute;
    bottom: calc(var(--hud-height) + 12px);
    left: 12px;
    font-size: 12px;
    color: #ffffffba;
}

@media (max-width: 560px) {
    :root { --fighter-width: 62px; --fighter-height: 114px; }
    button { width: 52px; height: 52px; font-size: 16px; }
    #controls { padding: 0 8px; }
    #announcer { top: 62px; font-size: 16px; }
    #meta-row { grid-template-columns: 1fr 1fr; }
    #round-area { grid-column: span 2; justify-self: center; }
    #combo { font-size: 14px; top: 100px; }
}
</style>
</head>
<body>
<div id="game">
    <div id="hud">
        <div class="health-row">
            <div class="health-container"><div id="player-health" class="health-bar"></div></div>
            <div id="timer">60</div>
            <div class="health-container"><div id="enemy-health" class="health-bar"></div></div>
        </div>
        <div id="meta-row">
            <div class="meter-wrap"><span>P1 SUPER</span><div class="meter"><div id="special-fill" class="meter-fill"></div></div></div>
            <div class="meter-wrap"><span>CPU SUPER</span><div class="meter"><div id="enemy-super-fill" class="meter-fill"></div></div></div>
            <div id="round-area">
                <span id="round">Round 1</span>
                <div id="player-score" class="round-pips"><span class="pip"></span><span class="pip"></span></div>
                <div id="enemy-score" class="round-pips"><span class="pip"></span><span class="pip"></span></div>
            </div>
        </div>
    </div>

    <div class="stage-banner">Downtown Arena</div>
    <div id="announcer">Fight!</div>
    <div id="combo"></div>

    <div id="arena">
        <div id="player" class="fighter face-right"></div>
        <div id="enemy" class="fighter face-left"></div>
        <div id="floor"></div>
    </div>

    <div id="keyboard-tip">Keyboard: A/D move · W jump · S crouch · J punch · U kick · K block · L fireball</div>

    <div id="controls">
        <div class="control-pad">
            <button onclick="move(-1)">◀</button>
            <button class="jump" onclick="jump()">⤴</button>
            <button onpointerdown="setCrouch(true)" onpointerup="setCrouch(false)" onpointercancel="setCrouch(false)">▼</button>
            <button onclick="move(1)">▶</button>
        </div>
        <div class="action-pad">
            <button class="block" onpointerdown="setBlocking(true)" onpointerup="setBlocking(false)" onpointercancel="setBlocking(false)">🛡</button>
            <button class="attack" onclick="attack()">👊</button>
            <button class="kick" onclick="kick()">🦶</button>
            <button class="special" onclick="special()">🔥</button>
        </div>
    </div>
</div>

<script>
const playerEl = document.getElementById("player");
const enemyEl = document.getElementById("enemy");
const arenaEl = document.getElementById("arena");
const announcerEl = document.getElementById("announcer");
const comboEl = document.getElementById("combo");
const timerEl = document.getElementById("timer");
const playerHealthEl = document.getElementById("player-health");
const enemyHealthEl = document.getElementById("enemy-health");
const specialFillEl = document.getElementById("special-fill");
const enemySuperFillEl = document.getElementById("enemy-super-fill");
const roundEl = document.getElementById("round");
const playerPips = [...document.querySelectorAll("#player-score .pip")];
const enemyPips = [...document.querySelectorAll("#enemy-score .pip")];

const state = {
    playerX: 80,
    enemyX: Math.max(window.innerWidth - 160, 260),
    playerY: 0,
    enemyY: 0,
    playerHealth: 100,
    enemyHealth: 100,
    playerSuper: 0,
    enemySuper: 0,
    timer: 60,
    round: 1,
    playerScore: 0,
    enemyScore: 0,
    playerFacing: 1,
    enemyFacing: -1,
    playerBlocking: false,
    enemyBlocking: false,
    playerCrouch: false,
    enemyCrouch: false,
    playerCombo: 0,
    lastHitAt: 0,
    canAct: true
};

const projectiles = [];

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function getDistance() {
    return Math.abs(state.playerX - state.enemyX);
}

function faceOpponents() {
    const playerShouldFaceRight = state.playerX <= state.enemyX;
    state.playerFacing = playerShouldFaceRight ? 1 : -1;
    state.enemyFacing = -state.playerFacing;

    playerEl.classList.toggle("face-right", state.playerFacing === 1);
    playerEl.classList.toggle("face-left", state.playerFacing === -1);
    enemyEl.classList.toggle("face-right", state.enemyFacing === 1);
    enemyEl.classList.toggle("face-left", state.enemyFacing === -1);
}

function render() {
    faceOpponents();

    playerEl.style.left = `${state.playerX}px`;
    enemyEl.style.left = `${state.enemyX}px`;
    playerEl.style.bottom = `${170 + state.playerY}px`;
    enemyEl.style.bottom = `${170 + state.enemyY}px`;

    playerEl.classList.toggle("block", state.playerBlocking);
    enemyEl.classList.toggle("block", state.enemyBlocking);
    playerEl.classList.toggle("crouch", state.playerCrouch);
    enemyEl.classList.toggle("crouch", state.enemyCrouch);

    playerHealthEl.style.width = `${Math.max(state.playerHealth, 0)}%`;
    enemyHealthEl.style.width = `${Math.max(state.enemyHealth, 0)}%`;
    specialFillEl.style.width = `${state.playerSuper}%`;
    enemySuperFillEl.style.width = `${state.enemySuper}%`;
    timerEl.textContent = state.timer;
    roundEl.textContent = `Round ${state.round}`;

    playerPips.forEach((pip, index) => pip.classList.toggle("win", index < state.playerScore));
    enemyPips.forEach((pip, index) => pip.classList.toggle("win", index < state.enemyScore));
}

function showAnnouncer(message, timeout = 900) {
    announcerEl.textContent = message;
    announcerEl.style.opacity = "1";
    if (timeout > 0) {
        setTimeout(() => announcerEl.style.opacity = "0", timeout);
    }
}

function showCombo(count) {
    if (count < 2) {
        comboEl.style.opacity = "0";
        return;
    }
    comboEl.textContent = `${count} HIT COMBO!`;
    comboEl.style.opacity = "1";
    setTimeout(() => {
        comboEl.style.opacity = "0";
    }, 650);
}

function animateState(target, className, ms = 140) {
    target.classList.add(className);
    setTimeout(() => target.classList.remove(className), ms);
}

function move(direction) {
    if (!state.canAct) return;
    const step = state.playerCrouch ? 10 : 24;
    state.playerX = clamp(state.playerX + (direction * step), 0, window.innerWidth - 84);
    render();
}

function setBlocking(isBlocking) {
    if (!state.canAct) return;
    state.playerBlocking = isBlocking;
    render();
}

function setCrouch(isCrouching) {
    if (!state.canAct) return;
    state.playerCrouch = isCrouching;
    render();
}

function applyPlayerHit(baseDamage) {
    if (!state.canAct) return;
    const inRange = getDistance() < 118;
    if (!inRange || state.playerY > 0) return;

    const blocked = state.enemyBlocking && !state.enemyCrouch;
    const damage = blocked ? Math.ceil(baseDamage * 0.35) : baseDamage;

    state.enemyHealth -= damage;
    state.playerSuper = clamp(state.playerSuper + (blocked ? 7 : 14), 0, 100);
    state.enemySuper = clamp(state.enemySuper + 4, 0, 100);

    animateState(enemyEl, "hit");

    const now = Date.now();
    state.playerCombo = now - state.lastHitAt < 950 ? state.playerCombo + 1 : 1;
    state.lastHitAt = now;
    showCombo(state.playerCombo);

    checkRoundState();
    render();
}

function attack() {
    if (!state.canAct) return;
    animateState(playerEl, "punch");
    applyPlayerHit(state.playerCrouch ? 8 : 11);
}

function kick() {
    if (!state.canAct) return;
    animateState(playerEl, "kick");
    applyPlayerHit(state.playerCrouch ? 10 : 14);
}

function spawnProjectile(fromEnemy = false) {
    const fromX = fromEnemy ? state.enemyX : state.playerX;
    const fromY = fromEnemy ? state.enemyY : state.playerY;
    const direction = fromEnemy ? state.enemyFacing : state.playerFacing;
    const xOffset = direction === 1 ? 56 : -20;

    const node = document.createElement("div");
    node.className = `projectile${fromEnemy ? " enemy" : ""}`;
    arenaEl.appendChild(node);

    projectiles.push({
        x: fromX + xOffset,
        y: 176 + fromY + 40,
        dir: direction,
        speed: 16,
        ownerEnemy: fromEnemy,
        el: node
    });
}

function special() {
    if (!state.canAct || state.playerSuper < 40) return;
    state.playerSuper = clamp(state.playerSuper - 40, 0, 100);
    animateState(playerEl, "punch", 190);
    showAnnouncer("HADOUKEN!", 550);
    spawnProjectile(false);
    render();
}

function jump() {
    if (!state.canAct || state.playerY > 0) return;
    let velocity = 18;
    const gravity = 1.18;
    const jumpTick = setInterval(() => {
        state.playerY = Math.max(0, state.playerY + velocity);
        velocity -= gravity;
        if (state.playerY === 0 && velocity < 0) {
            clearInterval(jumpTick);
        }
        render();
    }, 16);
}

function enemyJump() {
    if (state.enemyY > 0) return;
    let velocity = 16;
    const gravity = 1.2;
    const jumpTick = setInterval(() => {
        state.enemyY = Math.max(0, state.enemyY + velocity);
        velocity -= gravity;
        if (state.enemyY === 0 && velocity < 0) {
            clearInterval(jumpTick);
        }
        render();
    }, 16);
}

function applyEnemyHit(baseDamage) {
    const blocked = state.playerBlocking && !state.playerCrouch;
    const damage = blocked ? Math.ceil(baseDamage * 0.35) : baseDamage;

    state.playerHealth -= damage;
    state.enemySuper = clamp(state.enemySuper + 11, 0, 100);
    state.playerSuper = clamp(state.playerSuper + 6, 0, 100);

    animateState(playerEl, "hit");
    checkRoundState();
    render();
}

function enemyAI() {
    if (!state.canAct) return;

    const delta = state.playerX - state.enemyX;
    const closeEnough = Math.abs(delta) < 112;

    state.enemyBlocking = Math.random() > 0.82;
    state.enemyCrouch = Math.random() > 0.92;

    if (!closeEnough) {
        state.enemyX += clamp(delta, -18, 18);
    } else {
        const roll = Math.random();
        if (roll > 0.62) {
            animateState(enemyEl, "punch");
            applyEnemyHit(state.enemyCrouch ? 7 : 9);
        } else if (roll > 0.45) {
            animateState(enemyEl, "kick");
            applyEnemyHit(12);
        } else if (roll > 0.38 && state.enemySuper >= 40) {
            state.enemySuper -= 40;
            spawnProjectile(true);
            showAnnouncer("CPU FIREBALL", 500);
        }
    }

    if (Math.random() > 0.9 && state.enemyY === 0) enemyJump();

    state.enemyX = clamp(state.enemyX, 20, window.innerWidth - 100);
    render();
}

function resetRoundPositions() {
    state.playerHealth = 100;
    state.enemyHealth = 100;
    state.playerSuper = 0;
    state.enemySuper = 0;
    state.playerX = 80;
    state.enemyX = Math.max(window.innerWidth - 160, 260);
    state.timer = 60;
    state.playerY = 0;
    state.enemyY = 0;
    state.playerBlocking = false;
    state.enemyBlocking = false;
    state.playerCrouch = false;
    state.enemyCrouch = false;
    state.playerCombo = 0;

    while (projectiles.length) {
        const p = projectiles.pop();
        p.el.remove();
    }
}

function endMatchIfNeeded() {
    if (state.playerScore >= 2 || state.enemyScore >= 2) {
        const matchMessage = state.playerScore > state.enemyScore ? "PLAYER 1 WINS" : "CPU WINS";
        showAnnouncer(matchMessage, 0);
        state.canAct = false;

        setTimeout(() => {
            state.round = 1;
            state.playerScore = 0;
            state.enemyScore = 0;
            resetRoundPositions();
            state.canAct = true;
            showAnnouncer("NEW MATCH", 900);
            render();
        }, 2600);
        return true;
    }
    return false;
}

function checkRoundState() {
    if (state.enemyHealth > 0 && state.playerHealth > 0 && state.timer > 0) return;

    state.canAct = false;
    let message = "Time Up";

    if (state.enemyHealth <= 0) {
        message = "KO! You Win";
        state.playerScore += 1;
    } else if (state.playerHealth <= 0) {
        message = "KO! You Lose";
        state.enemyScore += 1;
    } else if (state.playerHealth > state.enemyHealth) {
        message = "Time Over - You Win";
        state.playerScore += 1;
    } else if (state.playerHealth < state.enemyHealth) {
        message = "Time Over - You Lose";
        state.enemyScore += 1;
    } else {
        message = "Double KO";
    }

    showAnnouncer(message, 0);
    render();

    setTimeout(() => {
        if (endMatchIfNeeded()) return;
        state.round += 1;
        resetRoundPositions();
        state.canAct = true;
        showAnnouncer("Fight!", 850);
        render();
    }, 1800);
}

function tickProjectiles() {
    if (!state.canAct && projectiles.length === 0) return;

    for (let i = projectiles.length - 1; i >= 0; i -= 1) {
        const p = projectiles[i];
        p.x += p.dir * p.speed;
        p.el.style.left = `${p.x}px`;
        p.el.style.bottom = `${p.y}px`;

        const offscreen = p.x < -40 || p.x > window.innerWidth + 40;
        if (offscreen) {
            p.el.remove();
            projectiles.splice(i, 1);
            continue;
        }

        if (p.ownerEnemy) {
            const hitPlayer = Math.abs(p.x - state.playerX) < 52 && state.playerY < 65;
            if (hitPlayer) {
                p.el.remove();
                projectiles.splice(i, 1);
                applyEnemyHit(15);
            }
        } else {
            const hitEnemy = Math.abs(p.x - state.enemyX) < 52 && state.enemyY < 65;
            if (hitEnemy) {
                p.el.remove();
                projectiles.splice(i, 1);
                const blocked = state.enemyBlocking;
                state.enemyHealth -= blocked ? 7 : 18;
                state.playerSuper = clamp(state.playerSuper + 10, 0, 100);
                animateState(enemyEl, "hit");
                checkRoundState();
                render();
            }
        }
    }
}

setInterval(() => {
    if (!state.canAct) return;
    state.timer = Math.max(state.timer - 1, 0);
    if (state.timer === 0) {
        checkRoundState();
    }
    render();
}, 1000);

setInterval(enemyAI, 640);
setInterval(tickProjectiles, 40);

window.addEventListener("keydown", (event) => {
    const key = event.key.toLowerCase();

    switch (key) {
        case "a": move(-1); break;
        case "d": move(1); break;
        case "w": jump(); break;
        case "s": setCrouch(true); break;
        case "j": attack(); break;
        case "u": kick(); break;
        case "k": setBlocking(true); break;
        case "l": special(); break;
        default: break;
    }
});

window.addEventListener("keyup", (event) => {
    const key = event.key.toLowerCase();
    if (key === "k") setBlocking(false);
    if (key === "s") setCrouch(false);
});

window.addEventListener("resize", () => {
    state.playerX = clamp(state.playerX, 0, window.innerWidth - 84);
    state.enemyX = clamp(state.enemyX, 20, window.innerWidth - 100);
    render();
});

render();
showAnnouncer("Fight!");
</script>
</body>
</html>
